<text x="100" y="367" font-size="11" fill="#fff">BM25 + HD query expansion + intent decompose + adaptive cutoff</text>
<text x="820" y="358" text-anchor="end" font-size="10" fill="#fff" opacity="0.7">stdlib</text>
<rect x="80" y="400" width="760" height="60" rx="10" class="box" fill="url(#ggreen)"/>
<text x="100" y="425" font-size="15" font-weight="bold" fill="#fff">L3   Output Guardrail</text>
<text x="100" y="447" font-size="11" fill="#fff">PII mask + profanity block + per-sentence citation verifier</text>
<text x="820" y="438" text-anchor="end" font-size="10" fill="#fff" opacity="0.7">stdlib</text>
