<rect width="920" height="580" fill="#fafafa"/>
<text x="460" y="32" text-anchor="middle" class="lbl-big">VEDA-X System Architecture</text><text x="460" y="52" text-anchor="middle" class="lbl-sm">5 layers, pure Python stdlib (FastAPI for HTTP)</text><rect x="80" y="80" width="760" height="60" rx="10" class="box" fill="url(#gpurple)"/>
<text x="100" y="105" font-size="15" font-weight="bold" fill="#fff">Client</text>
