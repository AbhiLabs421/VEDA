<rect x="80" y="480" width="370" height="55" rx="6" class="box" fill="#fff3cd"/>
<text x="100" y="503" class="lbl-h">L4 Audit</text>
<text x="100" y="525" class="lbl-sm">SQLite event log, retention purge, replay</text>
<rect x="470" y="480" width="370" height="55" rx="6" class="box" fill="#e2d5f0"/>
