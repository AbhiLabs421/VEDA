<text x="820" y="118" text-anchor="end" font-size="10" fill="#fff" opacity="0.7">stdlib</text>
<rect x="80" y="160" width="760" height="60" rx="10" class="box" fill="url(#gred)"/>
<text x="100" y="185" font-size="15" font-weight="bold" fill="#fff">L1   Input Guardrail</text>
<text x="100" y="207" font-size="11" fill="#fff">regex + base64-decode + leet de-obfuscate + Hinglish + PII</text>
<text x="820" y="198" text-anchor="end" font-size="10" fill="#fff" opacity="0.7">stdlib</text>
