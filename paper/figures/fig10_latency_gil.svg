<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" width="680" height="460" font-family="Helvetica, Arial, sans-serif">
<title></title>
<style>
  .lbl{font-size:13px;fill:#222}
  .lbl-sm{font-size:11px;fill:#444}
  .lbl-tiny{font-size:9px;fill:#666}
  .lbl-big{font-size:17px;fill:#111;font-weight:bold}
  .lbl-h{font-size:14px;fill:#111;font-weight:bold}
  .box{stroke:#333;stroke-width:1.2}
  .axis{stroke:#444;stroke-width:1}
  .grid{stroke:#ddd;stroke-width:0.5;stroke-dasharray:3 3}
  .mono{font-family:Courier New, monospace;font-size:11px;fill:#222}
  .mono-sm{font-family:Courier New, monospace;font-size:10px;fill:#333}
</style>
<defs>
  <linearGradient id="gblue" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#1f77b4" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#08306b" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="ggreen" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#2ca02c" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#1b5e20" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="gorange" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#ff7f0e" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#bf5f00" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="gred" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#d62728" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#8b0000" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="gpurple" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#9467bd" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#4a148c" stop-opacity="0.9"/>
  </linearGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/></marker>
  <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f77b4"/></marker>
</defs>
<rect width="680" height="460" fill="#fafafa"/>
<text x="340" y="28" text-anchor="middle" class="lbl-big">Single vs multi-agent latency (ms / query)</text>
<text x="340" y="48" text-anchor="middle" class="lbl-sm">Same retrieval, three orchestrations.  Python GIL serialises CPU-bound work.</text>
<line x1="90" y1="360" x2="620" y2="360" class="grid"/>
<text x="82" y="364" text-anchor="end" class="lbl-sm">0</text>
<line x1="90" y1="295" x2="620" y2="295" class="grid"/>
<text x="82" y="299" text-anchor="end" class="lbl-sm">30</text>
<line x1="90" y1="230" x2="620" y2="230" class="grid"/>
<text x="82" y="234" text-anchor="end" class="lbl-sm">60</text>
<line x1="90" y1="165" x2="620" y2="165" class="grid"/>
<text x="82" y="169" text-anchor="end" class="lbl-sm">90</text>
<line x1="90" y1="100" x2="620" y2="100" class="grid"/>
<text x="82" y="104" text-anchor="end" class="lbl-sm">120</text>
<text x="40" y="230" text-anchor="middle" class="lbl-sm" transform="rotate(-90,40,230)">ms / query (lower is better)</text>
<line x1="90" y1="90" x2="90" y2="360" class="axis"/>
<line x1="90" y1="360" x2="620" y2="360" class="axis"/>
<rect x="155" y="259" width="90" height="101" fill="url(#ggreen)" stroke="#333" stroke-width="0.8" rx="3"/>
<text x="200" y="237" text-anchor="middle" class="lbl" font-weight="bold">47 ms</text>
<text x="200" y="253" text-anchor="middle" class="lbl-tiny" fill="#444">fastest</text>
<text x="200" y="382" text-anchor="middle" class="lbl">Single agent</text>
<rect x="310" y="224" width="90" height="136" fill="url(#gorange)" stroke="#333" stroke-width="0.8" rx="3"/>
<text x="355" y="202" text-anchor="middle" class="lbl" font-weight="bold">63 ms</text>
<text x="355" y="218" text-anchor="middle" class="lbl-tiny" fill="#444">+34%</text>
<text x="355" y="382" text-anchor="middle" class="lbl">Multi-agent (seq)</text>
<rect x="465" y="137" width="90" height="223" fill="url(#gred)" stroke="#333" stroke-width="0.8" rx="3"/>
<text x="510" y="115" text-anchor="middle" class="lbl" font-weight="bold">103 ms</text>
<text x="510" y="131" text-anchor="middle" class="lbl-tiny" fill="#444">+119% (GIL contention)</text>
<text x="510" y="382" text-anchor="middle" class="lbl">Multi-agent (par)</text>
<text x="340" y="420" text-anchor="middle" class="lbl-sm">Counter-intuitive negative result: thread-level parallel is WORSE because BM25 + HD scoring is CPU-bound.</text>
<text x="340" y="438" text-anchor="middle" class="lbl-sm" fill="#666">Reproduce: python scripts/bench_single_vs_multi_agent.py</text>
</svg>
