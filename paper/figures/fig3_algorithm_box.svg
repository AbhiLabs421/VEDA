<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" width="780" height="520" font-family="Helvetica, Arial, sans-serif">
<title></title>
<style>
  .lbl{font-size:13px;fill:#222}
  .lbl-sm{font-size:11px;fill:#444}
  .lbl-tiny{font-size:9px;fill:#666}
  .lbl-big{font-size:17px;fill:#111;font-weight:bold}
  .lbl-h{font-size:14px;fill:#111;font-weight:bold}
  .box{stroke:#333;stroke-width:1.2}
  .axis{stroke:#444;stroke-width:1}
  .grid{stroke:#ddd;stroke-width:0.5;stroke-dasharray:3 3}
  .mono{font-family:Courier New, monospace;font-size:11px;fill:#222}
  .mono-sm{font-family:Courier New, monospace;font-size:10px;fill:#333}
</style>
<defs>
  <linearGradient id="gblue" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#1f77b4" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#08306b" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="ggreen" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#2ca02c" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#1b5e20" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="gorange" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#ff7f0e" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#bf5f00" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="gred" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#d62728" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#8b0000" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="gpurple" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#9467bd" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#4a148c" stop-opacity="0.9"/>
  </linearGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/></marker>
  <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f77b4"/></marker>
</defs>
<rect width="780" height="520" fill="#fafafa"/>
<text x="390" y="32" text-anchor="middle" class="lbl-big">Algorithm 1: VEDA-X retrieval</text>
<text x="390" y="52" text-anchor="middle" class="lbl-sm">Pure-stdlib, deterministic, no external embedding model</text>
<rect x="30" y="80" width="720" height="420" rx="8" fill="#fff" stroke="#1f77b4" stroke-width="1.6"/>
<rect x="30" y="80" width="720" height="30" rx="8" fill="url(#gblue)"/>
<text x="45" y="100" font-size="13" fill="#fff" font-weight="bold">VedaX_Search(query q, int k_max) → List[Hit]</text>
<text x="50" y="130" class="mono-sm" fill="#222">1:</text>
<text x="85" y="130" class="mono-sm" fill="#222">Input  : query q, chunk set C, BM25 index, semantic memory S</text>
<text x="50" y="147" class="mono-sm" fill="#222">2:</text>
<text x="85" y="147" class="mono-sm" fill="#222">Output : ranked hits with is_critical / critical_title flags</text>
<text x="50" y="172" class="mono-sm" fill="#7f7f7f">3:</text>
<text x="85" y="172" class="mono-sm" fill="#7f7f7f"># Stage 1 — lexical first pass</text>
<text x="50" y="189" class="mono-sm" fill="#222">4:</text>
<text x="85" y="189" class="mono-sm" fill="#222">cands ← BM25.search(q, k=50)            // top-50 by BM25 score</text>
<text x="50" y="214" class="mono-sm" fill="#7f7f7f">5:</text>
<text x="85" y="214" class="mono-sm" fill="#7f7f7f"># Stage 2 — hyperdimensional expansion</text>
<text x="50" y="231" class="mono-sm" fill="#222">6:</text>
<text x="85" y="231" class="mono-sm" fill="#222">q⃗ ← Σ_{t∈tokens(q)} HV(t)               // sparse 2048-dim</text>
<text x="50" y="248" class="mono-sm" fill="#222">7:</text>
<text x="85" y="248" class="mono-sm" fill="#222">for each term t in top-10 chunks of cands:</text>
<text x="50" y="265" class="mono-sm" fill="#222">8:</text>
<text x="85" y="265" class="mono-sm" fill="#222">    score_t ← cos(context_HV(t), q⃗) · log(1+df_t)</text>
<text x="50" y="282" class="mono-sm" fill="#222">9:</text>
<text x="85" y="282" class="mono-sm" fill="#222">exp_terms ← top-10 by score_t</text>
<text x="50" y="299" class="mono-sm" fill="#222">10:</text>
<text x="85" y="299" class="mono-sm" fill="#222">merged ← 0.6 · BM25(q) + 0.4 · BM25(q ⊕ exp_terms)</text>
<text x="50" y="324" class="mono-sm" fill="#7f7f7f">11:</text>
<text x="85" y="324" class="mono-sm" fill="#7f7f7f"># Stage 3 — intent rescoring</text>
<text x="50" y="341" class="mono-sm" fill="#222">12:</text>
<text x="85" y="341" class="mono-sm" fill="#222">(intent, subject, fillers) ← decompose(q)</text>
<text x="50" y="358" class="mono-sm" fill="#222">13:</text>
<text x="85" y="358" class="mono-sm" fill="#222">for each cid in merged:</text>
<text x="50" y="375" class="mono-sm" fill="#222">14:</text>
<text x="85" y="375" class="mono-sm" fill="#222">    adj[cid] ← Σ w(t) · log(1+tf_cid[t])</text>
<text x="50" y="392" class="mono-sm" fill="#222">15:</text>
<text x="85" y="392" class="mono-sm" fill="#222">                where w(subject)=3, w(filler)=1</text>
<text x="50" y="417" class="mono-sm" fill="#7f7f7f">16:</text>
<text x="85" y="417" class="mono-sm" fill="#7f7f7f"># Stage 4 — adaptive cutoff (score-plateau)</text>
<text x="50" y="434" class="mono-sm" fill="#222">17:</text>
<text x="85" y="434" class="mono-sm" fill="#222">sorted ← rank merged by adj[·]</text>
<text x="50" y="451" class="mono-sm" fill="#222">18:</text>
<text x="85" y="451" class="mono-sm" fill="#222">k* ← argmin_{i ≥ 1} { adj[sorted[i+1]] / adj[sorted[i]] < 0.6 }</text>
<text x="50" y="468" class="mono-sm" fill="#222">19:</text>
<text x="85" y="468" class="mono-sm" fill="#222">return  sorted[:min(k*, k_max)]   with chunk metadata</text>
</svg>
