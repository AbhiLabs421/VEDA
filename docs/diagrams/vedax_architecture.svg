<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" font-family="Inter,Segoe UI,Arial,sans-serif"><title>VEDA-X architecture</title><defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
  </marker>
  <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f6feb"/>
  </marker>
  <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#c63d3d"/>
  </marker>
  <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fafbfd"/>
    <stop offset="100%" stop-color="#eef1f7"/>
  </linearGradient>
</defs><rect width="1200" height="820" fill="url(#paper)"/><text x="600" y="38" font-size="22" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">VEDA-X  —  intent-aware, adaptive, grounded RAG</text><text x="600" y="62" font-size="13" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#555" text-anchor="middle">Hyperdimensional retrieval + query intent + adaptive cutoff + grounding guards.  Pure stdlib core.</text><rect x="30" y="90" width="1140" height="38" rx="6" ry="6" fill="#f6f7fb" stroke="#dcdfe6" stroke-width="1" opacity="1.0"/><text x="600.0" y="115" font-size="16" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">INDEXING  (one pass, no model, no DB)</text><rect x="30" y="152" width="175" height="95" rx="10" ry="10" fill="#e7f3ff" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="117.5" y="174" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Documents</text><text x="117.5" y="211.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">PDF · TXT · MD ·</text><text x="117.5" y="225.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Scanned images</text><line x1="206" y1="199.5" x2="218" y2="199.5" stroke="#1f6feb" stroke-width="2" marker-end="url(#arrow)"/><rect x="219" y="152" width="175" height="95" rx="10" ry="10" fill="#e7f3ff" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="306.5" y="174" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Built-in extractor</text><text x="306.5" y="211.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">veda.pdftext (stdlib)</text><text x="306.5" y="225.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">veda.ocr (stdlib)</text><line x1="395" y1="199.5" x2="407" y2="199.5" stroke="#1f6feb" stroke-width="2" marker-end="url(#arrow)"/><rect x="408" y="152" width="175" height="95" rx="10" ry="10" fill="#e7f3ff" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="495.5" y="174" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Tokenizer</text><text x="495.5" y="211.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">+ light stemmer</text><text x="495.5" y="225.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">+ acronym normaliser</text><line x1="584" y1="199.5" x2="596" y2="199.5" stroke="#1f6feb" stroke-width="2" marker-end="url(#arrow)"/><rect x="597" y="152" width="175" height="95" rx="10" ry="10" fill="#e8f5e9" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="684.5" y="174" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Hash-hypervectors</text><text x="684.5" y="211.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">blake2b → sparse</text><text x="684.5" y="225.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">ternary, zero storage</text><line x1="773" y1="199.5" x2="785" y2="199.5" stroke="#1f6feb" stroke-width="2" marker-end="url(#arrow)"/><rect x="786" y="152" width="175" height="95" rx="10" ry="10" fill="#e8f5e9" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="873.5" y="174" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Random indexing</text><text x="873.5" y="211.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Corpus-local</text><text x="873.5" y="225.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">semantic neighbours</text><line x1="962" y1="199.5" x2="974" y2="199.5" stroke="#1f6feb" stroke-width="2" marker-end="url(#arrow)"/><rect x="975" y="152" width="175" height="95" rx="10" ry="10" fill="#e8f5e9" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="1062.5" y="174" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Anchor-vote
posting index</text><text x="1062.5" y="211.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Sublinear search,</text><text x="1062.5" y="225.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">stdlib arrays only</text><rect x="30" y="290" width="1140" height="38" rx="6" ry="6" fill="#f6f7fb" stroke="#dcdfe6" stroke-width="1" opacity="1.0"/><text x="600.0" y="315" font-size="16" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">QUERY  (per question, all in-process)</text><rect x="40" y="360" width="220" height="130" rx="10" ry="10" fill="#fff8e1" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="150.0" y="382" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#6a4500" text-anchor="middle">1.  Intent decomposer</text><text x="150.0" y="402.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Detects: define / list /</text><text x="150.0" y="416.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">    procedure / yes-no / explain</text><text x="150.0" y="430.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Extracts: subject (real topic)</text><text x="150.0" y="444.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Strips: 'in single word',</text><text x="150.0" y="458.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">    'plz', 'bhai', 'kya hai'…</text><text x="150.0" y="472.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Acronym-first detection</text><text x="150.0" y="486.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">+ typo rescue (Levenshtein)</text><rect x="280" y="360" width="220" height="130" rx="10" ry="10" fill="#e8f5e9" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="390.0" y="382" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#1b5e20" text-anchor="middle">2.  Hybrid retrieval</text><text x="390.0" y="416.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">BM25 lexical</text><text x="390.0" y="430.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">+ Hyperdimensional semantic</text><text x="390.0" y="444.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">    (catches paraphrases like</text><text x="390.0" y="458.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">     'hot' ↔ 'temperature')</text><text x="390.0" y="472.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">+ optional MiniLM dense</text><rect x="520" y="360" width="220" height="130" rx="10" ry="10" fill="#e8f5e9" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="630.0" y="382" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#1b5e20" text-anchor="middle">3.  Subject-focused rescore</text><text x="630.0" y="423.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Subject weight × 3</text><text x="630.0" y="437.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Fillers weight = 0</text><text x="630.0" y="451.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">'single', 'define', 'briefly'</text><text x="630.0" y="465.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">    CAN NOT hijack ranking</text><rect x="760" y="360" width="220" height="130" rx="10" ry="10" fill="#fde9e9" stroke="#c97e7e" stroke-width="1.5" opacity="1.0"/><text x="870.0" y="382" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#933" text-anchor="middle">4.  Adaptive cutoff</text><text x="870.0" y="416.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Replaces fixed top-K</text><text x="870.0" y="430.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Score-plateau detection</text><text x="870.0" y="444.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">  clear winner → k = 1</text><text x="870.0" y="458.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">  spread answer → k = 3-5</text><text x="870.0" y="472.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">  off-topic     → k = 0</text><rect x="1000" y="360" width="170" height="130" rx="10" ry="10" fill="#fde9e9" stroke="#c97e7e" stroke-width="1.5" opacity="1.0"/><text x="1085.0" y="382" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#933" text-anchor="middle">5.  Grounding</text><text x="1085.0" y="416.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Abstention guard</text><text x="1085.0" y="430.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">   subject-coverage</text><text x="1085.0" y="444.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Citation verifier</text><text x="1085.0" y="458.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">   per-sentence</text><text x="1085.0" y="472.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">   support check</text><line x1="260" y1="425" x2="280" y2="425" stroke="#c63d3d" stroke-width="2" marker-end="url(#arrow)"/><line x1="500" y1="425" x2="520" y2="425" stroke="#c63d3d" stroke-width="2" marker-end="url(#arrow)"/><line x1="740" y1="425" x2="760" y2="425" stroke="#c63d3d" stroke-width="2" marker-end="url(#arrow)"/><line x1="980" y1="425" x2="1000" y2="425" stroke="#c63d3d" stroke-width="2" marker-end="url(#arrow)"/><rect x="30" y="520" width="1140" height="38" rx="6" ry="6" fill="#f6f7fb" stroke="#dcdfe6" stroke-width="1" opacity="1.0"/><text x="600.0" y="545" font-size="16" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">OUTPUT</text><rect x="40" y="590" width="320" height="130" rx="10" ry="10" fill="#eef5ff" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="200.0" y="612" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Grounded answer (no LLM)</text><text x="200.0" y="652.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Single best snippet,</text><text x="200.0" y="667.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">marked with file + span.</text><text x="200.0" y="682.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Zero hallucination by</text><text x="200.0" y="697.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">construction.</text><text x="200" y="757" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#555" text-anchor="middle">for offline / air-gapped use</text><rect x="400" y="590" width="360" height="130" rx="10" ry="10" fill="#fff8e1" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="580.0" y="612" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Chat with grounded LLM</text><text x="580.0" y="644.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">System prompt forces 'answer only</text><text x="580.0" y="659.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">from context, cite [1] [2]…'.</text><text x="580.0" y="674.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Streamed tokens, then citation</text><text x="580.0" y="689.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">verifier marks each sentence</text><text x="580.0" y="704.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">✓ supported / ✗ ungrounded.</text><text x="580" y="757" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#555" text-anchor="middle">for offline LLM (Ollama) or any OpenAI-style endpoint</text><rect x="800" y="590" width="370" height="130" rx="10" ry="10" fill="#fde9e9" stroke="#c97e7e" stroke-width="1.5" opacity="1.0"/><text x="985.0" y="612" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#933" text-anchor="middle">Abstain</text><text x="985.0" y="644.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Confidence + subject-coverage</text><text x="985.0" y="659.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">below threshold:</text><text x="985.0" y="674.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">  → 'Not in the provided documents.'</text><text x="985.0" y="689.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">  → LLM is NEVER called</text><text x="985.0" y="704.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Off-topic and prompt-injection safe.</text><text x="985" y="757" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#555" text-anchor="middle">the safety net that makes RAG production-grade</text><text x="600" y="793" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#1f6feb" text-anchor="middle">Zero external libraries in the core  ·  zero vector database  ·  zero pretrained embedding model required</text></svg>