<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" width="1100" height="640" font-family="Inter,Segoe UI,Arial,sans-serif"><title>Traditional RAG</title><defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
  </marker>
  <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f6feb"/>
  </marker>
  <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#c63d3d"/>
  </marker>
  <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fafbfd"/>
    <stop offset="100%" stop-color="#eef1f7"/>
  </linearGradient>
</defs><rect width="1100" height="640" fill="url(#paper)"/><text x="550" y="38" font-size="22" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Traditional RAG  —  the standard stack</text><text x="550" y="62" font-size="13" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#555" text-anchor="middle">Embedding model + vector DB + fixed top-k + LLM (with hallucination risk)</text><rect x="30" y="140" width="165" height="95" rx="10" ry="10" fill="#eef5ff" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="112.5" y="162" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Documents</text><text x="112.5" y="206.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">PDF, TXT, web</text><line x1="196" y1="187.5" x2="208" y2="187.5" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/><rect x="209" y="140" width="165" height="95" rx="10" ry="10" fill="#eef5ff" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="291.5" y="162" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Chunker</text><text x="291.5" y="206.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">fixed-size chunks</text><line x1="375" y1="187.5" x2="387" y2="187.5" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/><rect x="388" y="140" width="165" height="95" rx="10" ry="10" fill="#fff3e0" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="470.5" y="162" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Embedding
Model</text><text x="470.5" y="199.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">all-MiniLM-L6-v2,</text><text x="470.5" y="213.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">OpenAI-Ada, BGE…</text><line x1="554" y1="187.5" x2="566" y2="187.5" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/><rect x="567" y="140" width="165" height="95" rx="10" ry="10" fill="#fff3e0" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="649.5" y="162" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Vector DB</text><text x="649.5" y="199.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Pinecone, Weaviate,</text><text x="649.5" y="213.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Chroma, Faiss</text><line x1="733" y1="187.5" x2="745" y2="187.5" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/><rect x="746" y="140" width="165" height="95" rx="10" ry="10" fill="#fde9e9" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="828.5" y="162" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Fixed top-K
retrieval</text><text x="828.5" y="199.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">ALWAYS K chunks</text><text x="828.5" y="213.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">(K = 6 typical)</text><line x1="912" y1="187.5" x2="924" y2="187.5" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/><rect x="925" y="140" width="165" height="95" rx="10" ry="10" fill="#fde9e9" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="1007.5" y="162" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">LLM</text><text x="1007.5" y="199.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">GPT-4, Claude,</text><text x="1007.5" y="213.5" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Gemini</text><rect x="30" y="280" width="1040" height="38" rx="6" ry="6" fill="#f6f7fb" stroke="#dcdfe6" stroke-width="1" opacity="1.0"/><text x="550.0" y="305" font-size="16" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Where the problems live</text><rect x="30" y="340" width="250" height="130" rx="10" ry="10" fill="#fff3e0" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="155.0" y="362" font-size="13" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#7a3500" text-anchor="middle">Embedding API cost</text><text x="155.0" y="417.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Every doc + every query pays for a remote model call.</text><text x="155.0" y="431.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Inference cost is permanent and per-token.</text><rect x="290" y="340" width="250" height="130" rx="10" ry="10" fill="#fff3e0" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="415.0" y="362" font-size="13" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#7a3500" text-anchor="middle">Vector DB infra</text><text x="415.0" y="417.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Index server, replication, backups.</text><text x="415.0" y="431.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Drift between document version and index.</text><rect x="550" y="340" width="250" height="130" rx="10" ry="10" fill="#fde9e9" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="675.0" y="362" font-size="13" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#933" text-anchor="middle">Fixed top-K dilution</text><text x="675.0" y="417.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">K=6 always — 5 noise chunks dilute the LLM's</text><text x="675.0" y="431.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">attention even when answer lives in 1.</text><rect x="810" y="340" width="250" height="130" rx="10" ry="10" fill="#fde9e9" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="935.0" y="362" font-size="13" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#933" text-anchor="middle">Hallucination</text><text x="935.0" y="417.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">LLM may invent facts; no built-in citation</text><text x="935.0" y="431.0" font-size="11" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">verification — answer can be confidently wrong.</text><rect x="30" y="500" width="1040" height="38" rx="6" ry="6" fill="#f6f7fb" stroke="#dcdfe6" stroke-width="1" opacity="1.0"/><text x="550.0" y="525" font-size="16" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Dependencies</text><text x="550" y="583" font-size="13" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#333" text-anchor="middle">Python 3.x   ·   PyTorch / Transformers   ·   Embedding model (100 – 500 MB)   ·   Vector DB server   ·   Internet for the LLM provider</text><text x="550" y="612" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#666" text-anchor="middle">Online dependencies, paid inference, no in-built grounding guard against hallucination.</text></svg>