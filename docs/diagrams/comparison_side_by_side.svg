<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 980" width="1400" height="980" font-family="Inter,Segoe UI,Arial,sans-serif"><title>Traditional RAG vs VEDA-X</title><defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
  </marker>
  <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f6feb"/>
  </marker>
  <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#c63d3d"/>
  </marker>
  <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fafbfd"/>
    <stop offset="100%" stop-color="#eef1f7"/>
  </linearGradient>
</defs><rect width="1400" height="980" fill="url(#paper)"/><text x="700" y="40" font-size="24" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Traditional RAG   vs   VEDA-X — honest side-by-side</text><text x="700" y="65" font-size="13" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#555" text-anchor="middle">Same input, same goal.  Where each stack wins / loses.</text><rect x="30" y="95" width="660" height="38" rx="6" ry="6" fill="#f6f7fb" stroke="#dcdfe6" stroke-width="1" opacity="1.0"/><text x="360.0" y="120" font-size="16" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#7a3500" text-anchor="middle">TRADITIONAL RAG</text><rect x="710" y="95" width="660" height="38" rx="6" ry="6" fill="#f6f7fb" stroke="#dcdfe6" stroke-width="1" opacity="1.0"/><text x="1040.0" y="120" font-size="16" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#1b5e20" text-anchor="middle">VEDA-X (this repo)</text><rect x="694" y="148" width="696" height="0" rx="8" ry="8" fill="none" stroke="none" stroke-width="1.5" opacity="1.0"/><text x="700" y="195.0" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#222" text-anchor="middle">Document ingest</text><rect x="30" y="140" width="530" height="100" rx="10" ry="10" fill="#fff3e0" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="295.0" y="162" font-size="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle"></text><text x="295.0" y="194.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Run docs through a 100–500 MB</text><text x="295.0" y="209.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">embedding model API.</text><text x="295.0" y="224.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Inference cost per token.</text><rect x="840" y="140" width="530" height="100" rx="10" ry="10" fill="#e8f5e9" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="1105.0" y="162" font-size="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle"></text><text x="1105.0" y="194.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Pure-stdlib parser + OCR.</text><text x="1105.0" y="209.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Hash hypervectors — zero storage,</text><text x="1105.0" y="224.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">regenerated from bytes on demand.</text><rect x="694" y="256" width="696" height="0" rx="8" ry="8" fill="none" stroke="none" stroke-width="1.5" opacity="1.0"/><text x="700" y="303.0" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#222" text-anchor="middle">Storage</text><rect x="30" y="248" width="530" height="100" rx="10" ry="10" fill="#fff3e0" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="295.0" y="270" font-size="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle"></text><text x="295.0" y="302.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Vector DB (Pinecone / Weaviate /</text><text x="295.0" y="317.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Chroma).  Separate server,</text><text x="295.0" y="332.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">backups, drift risk.</text><rect x="840" y="248" width="530" height="100" rx="10" ry="10" fill="#e8f5e9" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="1105.0" y="270" font-size="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle"></text><text x="1105.0" y="302.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Compact signatures in RAM</text><text x="1105.0" y="317.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">+ optional single portable file.</text><text x="1105.0" y="332.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Document is the storage.</text><rect x="694" y="364" width="696" height="0" rx="8" ry="8" fill="none" stroke="none" stroke-width="1.5" opacity="1.0"/><text x="700" y="411.0" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#222" text-anchor="middle">Query understanding</text><rect x="30" y="356" width="530" height="100" rx="10" ry="10" fill="#fff3e0" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="295.0" y="378" font-size="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle"></text><text x="295.0" y="410.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Embed the query as one vector.</text><text x="295.0" y="425.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">No structure: 'define X in single</text><text x="295.0" y="440.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">word' ≈ 'X single word'.</text><rect x="840" y="356" width="530" height="100" rx="10" ry="10" fill="#e8f5e9" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="1105.0" y="378" font-size="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle"></text><text x="1105.0" y="403.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Decompose: intent + subject + fillers.</text><text x="1105.0" y="418.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Acronym + Hinglish + typo aware.</text><text x="1105.0" y="433.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">'plz', 'bhai', 'briefly' cannot</text><text x="1105.0" y="448.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">hijack scoring.</text><rect x="694" y="472" width="696" height="0" rx="8" ry="8" fill="none" stroke="none" stroke-width="1.5" opacity="1.0"/><text x="700" y="519.0" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#222" text-anchor="middle">Retrieval shape</text><rect x="30" y="464" width="530" height="100" rx="10" ry="10" fill="#fde9e9" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="295.0" y="486" font-size="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle"></text><text x="295.0" y="518.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">FIXED top-K (usually 6).</text><text x="295.0" y="533.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Always six chunks — even when</text><text x="295.0" y="548.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">answer lives in one.</text><rect x="840" y="464" width="530" height="100" rx="10" ry="10" fill="#e8f5e9" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="1105.0" y="486" font-size="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle"></text><text x="1105.0" y="511.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">ADAPTIVE cutoff.</text><text x="1105.0" y="526.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Clear winner → k=1.  Spread → k=3.</text><text x="1105.0" y="541.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Off-topic → k=0 (abstain).</text><text x="1105.0" y="556.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">LLM context tightens with the truth.</text><rect x="694" y="580" width="696" height="0" rx="8" ry="8" fill="none" stroke="none" stroke-width="1.5" opacity="1.0"/><text x="700" y="627.0" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#222" text-anchor="middle">Hallucination control</text><rect x="30" y="572" width="530" height="100" rx="10" ry="10" fill="#fde9e9" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="295.0" y="594" font-size="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle"></text><text x="295.0" y="626.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Hope the LLM behaves.</text><text x="295.0" y="641.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Optional human review.</text><text x="295.0" y="656.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">No structural guarantee.</text><rect x="840" y="572" width="530" height="100" rx="10" ry="10" fill="#e8f5e9" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="1105.0" y="594" font-size="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle"></text><text x="1105.0" y="619.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Confidence + subject-coverage guard:</text><text x="1105.0" y="634.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">LLM is NEVER called on off-topic.</text><text x="1105.0" y="649.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Per-sentence citation verifier</text><text x="1105.0" y="664.0" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">flags unsupported claims.</text><rect x="694" y="688" width="696" height="0" rx="8" ry="8" fill="none" stroke="none" stroke-width="1.5" opacity="1.0"/><text x="700" y="735.0" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#222" text-anchor="middle">Dependencies</text><rect x="30" y="680" width="530" height="100" rx="10" ry="10" fill="#fff3e0" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="295.0" y="702" font-size="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle"></text><text x="295.0" y="734.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">torch, transformers, sentence-</text><text x="295.0" y="749.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">transformers, faiss/chroma client,</text><text x="295.0" y="764.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">optional langchain, internet.</text><rect x="840" y="680" width="530" height="100" rx="10" ry="10" fill="#e8f5e9" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="1105.0" y="702" font-size="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle"></text><text x="1105.0" y="734.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Core: Python stdlib only.</text><text x="1105.0" y="749.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Optional dense stage: onnxruntime</text><text x="1105.0" y="764.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">+ tokenizers + numpy.</text><rect x="694" y="796" width="696" height="0" rx="8" ry="8" fill="none" stroke="none" stroke-width="1.5" opacity="1.0"/><text x="700" y="843.0" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#222" text-anchor="middle">Cost / latency</text><rect x="30" y="788" width="530" height="100" rx="10" ry="10" fill="#fff3e0" stroke="#a8b1bf" stroke-width="1.5" opacity="1.0"/><text x="295.0" y="810" font-size="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle"></text><text x="295.0" y="842.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Per-query embedding call.</text><text x="295.0" y="857.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Per-query LLM tokens × top-K.</text><text x="295.0" y="872.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Network RTT to provider.</text><rect x="840" y="788" width="530" height="100" rx="10" ry="10" fill="#e8f5e9" stroke="#869a9d" stroke-width="1.5" opacity="1.0"/><text x="1105.0" y="810" font-size="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle"></text><text x="1105.0" y="842.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Retrieval ≈ 2 ms (CPU).</text><text x="1105.0" y="857.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Smaller LLM prompts (adaptive k).</text><text x="1105.0" y="872.5" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Runs entirely offline.</text><rect x="30" y="904" width="1340" height="38" rx="6" ry="6" fill="#f6f7fb" stroke="#dcdfe6" stroke-width="1" opacity="1.0"/><text x="700.0" y="929" font-size="16" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#111" text-anchor="middle">Honest bottom line</text><text x="370" y="956" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#7a3500" text-anchor="middle">Modern RAG (Traditional)</text><text x="370" y="980" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Strong general semantics, slow + paid, hallucination by default, online infra.</text><text x="1030" y="956" font-size="14" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" fill="#1b5e20" text-anchor="middle">VEDA-X</text><text x="1030" y="980" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="normal" fill="#444" text-anchor="middle">Cheap, fast, offline, structurally cannot hallucinate; general semantics weaker than a big embedder — but for one document it does not need it.</text></svg>